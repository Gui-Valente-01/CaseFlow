name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint + build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 24: os testes de comportamento (tests/behavior.test.mjs)
      # importam .ts direto via type stripping, nativo a partir do 23.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      # As variáveis públicas do Supabase precisam existir só pra o build
      # passar sem dar erro de env undefined. Como o build do Next compila
      # client-side com NEXT_PUBLIC_*, qualquer valor não-vazio basta —
      # nada de fato é chamado em build time.
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key

      # Sobe o servidor de produção com os mesmos placeholders e bate nas
      # rotas públicas. Funciona sem credenciais reais: o middleware trata
      # o Supabase inacessível como "sem sessão" e o /dashboard redireciona
      # pro /login do mesmo jeito.
      - name: Smoke tests
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          TEST_BASE_URL: http://localhost:3100
        run: |
          npx next start -p 3100 &
          for i in $(seq 1 30); do
            curl -fsS http://localhost:3100/ > /dev/null 2>&1 && break
            sleep 1
          done
          npm run test:smoke
